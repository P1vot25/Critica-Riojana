title: Crítica Riojana
description: Análisis independiente y cenital de la política local en La Rioja. Datos, patrones y preguntas incómodas para el debate público.

remote_theme: just-the-docs/just-the-docs
color_scheme: light  # o 'dark' si preferís modo noche pro

search_enabled: true
search:
  previews: 5
  preview_words_before: 5
  preview_words_after: 10

logo: "/assets/images/logo-observatorio.png"  # subí una imagen simple (texto + escudo Rioja o lupa)

aux_links:
  Facebook: https://www.facebook.com/profile.php?id=61577670838127  # crea la page y pon link
  GitHub: https://github.com/p1v0t25/observatorio-critica-riojana

aux_links_new_tab: true

# Callouts para destacar preguntas
callouts:
  pregunta:
    color: red
    title: Pregunta abierta

# RSS
plugins:
  - jekyll-feed
